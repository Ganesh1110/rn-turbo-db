buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.6.1"
    }
}

apply plugin: "com.android.library"

def getExtOrDefault(name) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["SecureDB_" + name]
}

android {
    namespace "com.securedb"
    compileSdkVersion getExtOrDefault("compileSdkVersion")?.toInteger() ?: 35

    defaultConfig {
        minSdkVersion getExtOrDefault("minSdkVersion")?.toInteger() ?: 23
        targetSdkVersion getExtOrDefault("targetSdkVersion")?.toInteger() ?: 35

        externalNativeBuild {
            cmake {
                cppFlags "-O3 -frtti -fexceptions -Wall -fstack-protector-all"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    buildFeatures {
        prefab true
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    lintOptions {
        disable "GradleCompatible"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            java.srcDirs = ["src/main/java"]
        }
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation "com.facebook.react:react-native:+"
}
